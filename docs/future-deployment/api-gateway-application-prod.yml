server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
        
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
      
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://delichops.com"
              - "https://www.delichops.com"
              - "https://admin.delichops.com"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://auth.delichops.com}/realms/delichops
          jwk-set-uri: ${KEYCLOAK_URL:https://auth.delichops.com}/realms/delichops/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761}/eureka/
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:api-gateway}

logging:
  level:
    root: INFO
    com.delichops: DEBUG
    org.springframework.cloud.gateway: DEBUG
  file:
    name: /var/log/delichops/api-gateway.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
