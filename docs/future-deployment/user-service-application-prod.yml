server:
  port: 8082

spring:
  application:
    name: user-service
  
  data:
    mongodb:
      # Production MongoDB Atlas
      uri: ${MONGODB_URI}
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://auth.delichops.com}/realms/delichops
          jwk-set-uri: ${KEYCLOAK_URL:https://auth.delichops.com}/realms/delichops/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761}/eureka/
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:user-service}

logging:
  level:
    root: INFO
    com.delichops: DEBUG
    org.springframework.data.mongodb: INFO
  file:
    name: /var/log/delichops/user-service.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
