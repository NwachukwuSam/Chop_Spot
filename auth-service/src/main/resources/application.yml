server:
  port: 8081

spring:
  application:
    name: auth-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/delichops
          jwk-set-uri: http://localhost:9090/realms/delichops/protocol/openid-connect/certs

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9090}
  realm: ${KEYCLOAK_REALM:delichops}
  client-id: ${KEYCLOAK_CLIENT_ID:delichops-backend}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
