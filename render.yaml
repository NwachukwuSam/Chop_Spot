# Simplified Render Blueprint - Monolithic Architecture
databases:
  # PostgreSQL Database for Keycloak
  - name: delichops-postgres-akuq
    plan: free
    databaseName: keycloak
    user: keycloak

services:
  - type: web
    name: delichops-keycloak-akuq
    env: docker
    dockerfilePath: ./Dockerfile.keycloak
    plan: free
    envVars:
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL_HOST
        fromDatabase:
          name: delichops-postgres-akuq
          property: host
      - key: KC_DB_URL_PORT
        fromDatabase:
          name: delichops-postgres-akuq
          property: port
      - key: KC_DB_URL_DATABASE
        fromDatabase:
          name: delichops-postgres-akuq
          property: database
      - key: KC_DB_URL
        value: jdbc:postgresql://${KC_DB_URL_HOST}:${KC_DB_URL_PORT}/${KC_DB_URL_DATABASE}
      - key: KC_DB_USERNAME
        fromDatabase:
          name: delichops-postgres-akuq
          property: user
      - key: KC_DB_PASSWORD
        fromDatabase:
          name: delichops-postgres-akuq
          property: password
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_PROXY
        value: edge
      - key: KC_HTTP_ENABLED
        value: "true"
    healthCheckPath: /health/ready

  # Delichops Backend (Single Monolithic Application)
  - type: web
    name: delichops-backend-akuq
    env: docker
    dockerfilePath: ./delichops-backend/Dockerfile
    dockerContext: ./delichops-backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        value: mongodb+srv://sales_book_db:jcjvfsDtGkwoM8z3@salesbook.nkan5iy.mongodb.net/delichops_db?retryWrites=true&w=majority
      - key: KEYCLOAK_SERVER_URL
        fromService:
          name: delichops-keycloak-akuq
          type: web
          property: host
      - key: KEYCLOAK_ISSUER_URI
        sync: false  # Set manually: https://your-keycloak-url/realms/delichops
      - key: KEYCLOAK_JWK_SET_URI
        sync: false  # Set manually: https://your-keycloak-url/realms/delichops/protocol/openid-connect/certs
      - key: KEYCLOAK_REALM
        value: delichops
      - key: KEYCLOAK_CLIENT_ID
        value: delichops-backend
      - key: KEYCLOAK_CLIENT_SECRET
        sync: false  # Set manually after Keycloak setup
      - key: KEYCLOAK_ADMIN_USERNAME
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
