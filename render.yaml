# Render Blueprint for Delichops
# This file can be used to deploy all services at once
# Visit: https://dashboard.render.com/select-repo

services:
  # PostgreSQL Database for Keycloak
  - type: pserv
    name: delichops-postgres
    env: docker
    plan: free
    databases:
      - name: keycloak
        user: keycloak

  # Keycloak Authentication Server
  - type: web
    name: delichops-keycloak
    env: docker
    dockerfilePath: /Dockerfile.keycloak
    dockerCommand: /opt/keycloak/bin/start-keycloak.sh
    plan: free
    envVars:
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        fromDatabase:
          name: delichops-postgres
          property: connectionString
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_HOSTNAME_STRICT
        value: false
      - key: KC_PROXY
        value: edge
    healthCheckPath: /health/ready

  # Eureka Service Discovery
  - type: web
    name: delichops-eureka
    env: docker
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: ./eureka-server
    plan: free
    envVars:
      - key: PORT
        value: 8761

  # Auth Service
  - type: web
    name: delichops-auth
    env: docker
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: KEYCLOAK_SERVER_URL
        fromService:
          name: delichops-keycloak
          type: web
          property: host
      - key: KEYCLOAK_REALM
        value: delichops
      - key: KEYCLOAK_CLIENT_ID
        value: delichops-backend
      - key: KEYCLOAK_CLIENT_SECRET
        sync: false  # Set this manually after Keycloak setup
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/

  # User Service
  - type: web
    name: delichops-user
    env: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: ./user-service
    plan: free
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://sales_book_db:jcjvfsDtGkwoM8z3@salesbook.nkan5iy.mongodb.net/delichops_db?retryWrites=true&w=majority
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/

  # API Gateway (Main Entry Point)
  - type: web
    name: delichops-gateway
    env: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/
