# Render Blueprint for Delichops
# This file can be used to deploy all services at once
# Visit: https://dashboard.render.com/select-repo

services:
  # PostgreSQL Database for Keycloak
  - type: pserv
    name: delichops-postgres
    env: docker
    plan: free
    databases:
      - name: keycloak
        user: keycloak

  # Keycloak Authentication Server
  - type: web
    name: delichops-keycloak
    env: docker
    dockerfilePath: Dockerfile.keycloak
    plan: free
    envVars:
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        fromDatabase:
          name: delichops-postgres
          property: connectionString
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_HOSTNAME_STRICT
        value: false
      - key: KC_PROXY
        value: edge
    healthCheckPath: /health/ready

  # Eureka Service Discovery
  - type: web
    name: delichops-eureka
    env: java
    buildCommand: cd eureka-server && mvn clean package -DskipTests
    startCommand: java -jar eureka-server/target/eureka-server-1.0.0.jar
    plan: free
    envVars:
      - key: PORT
        value: 8761

  # Auth Service
  - type: web
    name: delichops-auth
    env: java
    buildCommand: cd auth-service && mvn clean package -DskipTests
    startCommand: java -jar auth-service/target/auth-service-1.0.0.jar
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: KEYCLOAK_SERVER_URL
        fromService:
          name: delichops-keycloak
          type: web
          property: host
      - key: KEYCLOAK_REALM
        value: delichops
      - key: KEYCLOAK_CLIENT_ID
        value: delichops-backend
      - key: KEYCLOAK_CLIENT_SECRET
        sync: false  # Set this manually after Keycloak setup
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/

  # User Service
  - type: web
    name: delichops-user
    env: java
    buildCommand: cd user-service && mvn clean package -DskipTests
    startCommand: java -jar user-service/target/user-service-1.0.0.jar
    plan: free
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://sales_book_db:jcjvfsDtGkwoM8z3@salesbook.nkan5iy.mongodb.net/delichops_db?retryWrites=true&w=majority
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/

  # API Gateway (Main Entry Point)
  - type: web
    name: delichops-gateway
    env: java
    buildCommand: cd api-gateway && mvn clean package -DskipTests
    startCommand: java -jar api-gateway/target/api-gateway-1.0.0.jar
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
        fromService:
          name: delichops-eureka
          type: web
          property: host
        value: /eureka/
